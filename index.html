<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>☠ Horror Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Creepster&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #111118;
    --card: #14141e;
    --card-hover: #1c1c2a;
    --border: #2a2a3a;
    --red: #ff2244;
    --red-dim: #7a0f1f;
    --text: #e8e8f0;
    --text-dim: #888899;
    --green: #22ff88;
    --orange: #ff8833;
    --tag-bg: #1e1e2e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 9999; opacity: 0.4;
  }
  /* ── Header ── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,10,15,0.93);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
  }
  .header-inner {
    max-width: 1400px; margin: 0 auto;
    display: flex; align-items: center; gap: 14px;
    height: 60px; flex-wrap: wrap;
  }
  .logo {
    font-family: 'Creepster', cursive;
    font-size: 1.7rem; color: var(--red);
    letter-spacing: 2px; white-space: nowrap; flex-shrink: 0;
    text-shadow: 0 0 18px rgba(255,34,68,0.5);
  }
  .search-wrap { flex: 1; min-width: 140px; max-width: 300px; position: relative; }
  .search-wrap input {
    width: 100%; background: var(--card);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 7px 12px 7px 34px; color: var(--text);
    font-family: 'Nunito', sans-serif; font-size: 0.88rem; outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--red); }
  .search-wrap input::placeholder { color: var(--text-dim); }
  .search-wrap::before {
    content: '🔍'; position: absolute; left: 9px; top: 50%;
    transform: translateY(-50%); font-size: 0.8rem; pointer-events: none;
  }
  .controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .sort-select {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 7px 10px; color: var(--text);
    font-family: 'Nunito', sans-serif; font-size: 0.83rem; outline: none; cursor: pointer;
  }
  .filter-btn {
    background: var(--tag-bg); border: 1px solid var(--border);
    border-radius: 20px; padding: 5px 12px; color: var(--text-dim);
    font-size: 0.78rem; font-family: 'Nunito', sans-serif;
    cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .filter-btn:hover, .filter-btn.active {
    border-color: var(--red); color: var(--red); background: rgba(255,34,68,0.08);
  }
  #stats { font-size: 0.78rem; color: var(--text-dim); white-space: nowrap; margin-left: auto; }
  /* ── Hero ── */
  .hero { text-align: center; padding: 50px 20px 28px; position: relative; overflow: hidden; }
  .hero::after {
    content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 60%; height: 1px;
    background: linear-gradient(90deg, transparent, var(--red-dim), transparent);
  }
  .hero h1 {
    font-family: 'Creepster', cursive;
    font-size: clamp(2.6rem, 7vw, 4.8rem);
    color: var(--text); letter-spacing: 4px; line-height: 1.1;
    text-shadow: 0 0 40px rgba(255,34,68,0.3), 0 2px 0 #000;
  }
  .hero h1 em { color: var(--red); font-style: normal; }
  .hero p { margin-top: 8px; color: var(--text-dim); font-size: 0.93rem; }
  .blood-drip {
    font-size: 1.5rem; display: block; margin: 4px 0 0;
    animation: drip 3s ease-in-out infinite; transform-origin: top center;
  }
  @keyframes drip { 0%,100%{transform:scaleY(1)} 50%{transform:scaleY(1.15)} }
  /* ── Grid ── */
  .grid-wrap { max-width: 1400px; margin: 0 auto; padding: 28px 18px 60px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(235px, 1fr)); gap: 16px; }
  /* ── Card ── */
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden;
    display: flex; flex-direction: column;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    animation: fadeIn 0.35s ease both;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .card:hover {
    transform: translateY(-4px); border-color: var(--red);
    box-shadow: 0 8px 28px rgba(255,34,68,0.15); background: var(--card-hover);
  }
  .card-img-wrap { position: relative; }
  .card-img { width:100%; aspect-ratio:460/215; object-fit:cover; display:block; background:var(--bg2); }
  .card-img-placeholder {
    width:100%; aspect-ratio:460/215;
    background: linear-gradient(135deg,#1a0a0f,#0f0f1a);
    display:flex; align-items:center; justify-content:center; font-size:2.2rem;
  }
  .sale-badge {
    position:absolute; top:7px; right:7px;
    background:var(--orange); color:#000;
    font-weight:700; font-size:0.7rem; padding:2px 6px; border-radius:4px;
  }
  .card-body { padding:12px 13px 10px; flex:1; display:flex; flex-direction:column; gap:7px; }
  .card-title { font-size:0.93rem; font-weight:700; line-height:1.3; color:var(--text); }
  .card-meta { display:flex; flex-wrap:wrap; gap:5px; margin-top:1px; }
  .tag {
    display:inline-flex; align-items:center; gap:3px;
    background:var(--tag-bg); border:1px solid var(--border);
    border-radius:6px; padding:3px 7px; font-size:0.74rem; color:var(--text-dim); white-space:nowrap;
  }
  .tag.price-free  { color:var(--green);  border-color:rgba(34,255,136,0.2);  background:rgba(34,255,136,0.05); }
  .tag.price-sale  { color:var(--orange); border-color:rgba(255,136,51,0.2);  background:rgba(255,136,51,0.05); }
  .tag.price-paid  { color:#aac4ff;       border-color:rgba(100,160,255,0.2); background:rgba(100,160,255,0.05); }
  .tag.price-demo  { color:#dd88ff;       border-color:rgba(200,100,255,0.2); background:rgba(200,100,255,0.05); }
  .card-note {
    font-size:0.78rem; color:var(--text-dim); font-style:italic;
    line-height:1.4; border-left:2px solid var(--red-dim); padding-left:8px;
  }
  .card-footer { padding:0 13px 13px; display:flex; gap:7px; margin-top:auto; }
  .btn-steam {
    flex:1; display:flex; align-items:center; justify-content:center; gap:5px;
    background:linear-gradient(135deg,#1b2838,#2a475e);
    border:1px solid #2a475e; border-radius:8px; padding:7px 10px;
    color:#c6d4df; font-family:'Nunito',sans-serif; font-size:0.8rem; font-weight:600;
    text-decoration:none; transition:all 0.18s;
  }
  .btn-steam:hover { background:linear-gradient(135deg,#2a475e,#1b2838); border-color:#66c0f4; color:#fff; }
  /* ── State ── */
  .state-msg { text-align:center; padding:80px 20px; color:var(--text-dim); font-size:1rem; }
  .state-msg .icon { font-size:3rem; display:block; margin-bottom:14px; }
  .spinner {
    width:38px; height:38px; border:3px solid var(--border); border-top-color:var(--red);
    border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 14px;
  }
  @keyframes spin { to{transform:rotate(360deg)} }
  /* ── Price shimmer ── */
  .price-loading {
    display:inline-block; width:44px; height:13px;
    background:linear-gradient(90deg,var(--border) 25%,#2a2a3a 50%,var(--border) 75%);
    background-size:200% 100%; animation:shimmer 1.2s infinite; border-radius:4px; vertical-align:middle;
  }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  /* ── Misc ── */
  ::-webkit-scrollbar { width:5px; }
  ::-webkit-scrollbar-track { background:var(--bg); }
  ::-webkit-scrollbar-thumb { background:var(--red-dim); border-radius:3px; }
  #last-updated { text-align:center; font-size:0.74rem; color:var(--text-dim); padding-bottom:10px; margin-top:-14px; }
  /* ── Error box ── */
  .err-box {
    background: rgba(255,34,68,0.07); border: 1px solid var(--red-dim);
    border-radius: 10px; padding: 20px 24px; max-width: 540px; margin: 0 auto;
    font-size: 0.88rem; line-height: 1.7; color: var(--text);
  }
  .err-box strong { color: var(--red); }
  .err-box code { background: #1e1e2e; padding: 1px 5px; border-radius: 4px; font-size: 0.82rem; }
  .retry-btn {
    display: inline-block; margin-top: 14px; padding: 8px 20px;
    background: var(--red); color: #fff; border: none; border-radius: 8px;
    font-family: 'Nunito', sans-serif; font-size: 0.88rem; font-weight: 700;
    cursor: pointer; transition: opacity 0.2s;
  }
  .retry-btn:hover { opacity: 0.85; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">Horror Games</div>
    <div class="search-wrap">
      <input type="text" id="search" placeholder="Game suchen…" autocomplete="off">
    </div>
    <div class="controls">
      <select class="sort-select" id="sort">
        <option value="name">Name A–Z</option>
        <option value="price-asc">Preis ↑</option>
        <option value="price-desc">Preis ↓</option>
        <option value="time-asc">Spielzeit ↑</option>
      </select>
      <button class="filter-btn active" data-filter="all">Alle</button>
      <button class="filter-btn" data-filter="free">Kostenlos</button>
      <button class="filter-btn" data-filter="demo">Demo</button>
    </div>
    <span id="stats"></span>
  </div>
</header>

<div class="hero">
  <h1><em>Horror</em> Games</h1>
  <p>Horror Games, die ich cool finde</p>
  <span class="blood-drip">🩸</span>
</div>

<div class="grid-wrap">
  <div id="last-updated"></div>
  <div class="grid" id="grid">
    <div class="state-msg" style="grid-column:1/-1">
      <div class="spinner"></div>
      Daten werden geladen…
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  CONFIG  ← hier nur anpassen wenn nötig
// ══════════════════════════════════════════════
const SHEET_ID   = '1DkkAnT3A-0Xw9prChT4M2OkWbe4uu2VmVFi9SHmeNUc';
const SHEET_GID  = '0';   // gid aus der URL, Standard = 0

// Drei verschiedene Lade-Methoden – wir versuchen sie der Reihe nach
const URLS = [
  // Methode 1: gviz/tq mit GID (beste Methode für benannte Sheets)
  `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${SHEET_GID}`,
  // Methode 2: gviz/tq ohne Sheet-Name
  `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`,
  // Methode 3: direkter Export
  `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${SHEET_GID}`,
];

const steamImg = id => `https://cdn.akamai.steamstatic.com/steam/apps/${id}/header.jpg`;

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let allGames = [], filteredGames = [], currentFilter = 'all';

// ══════════════════════════════════════════════
//  CSV LADEN — versucht alle drei URLs
// ══════════════════════════════════════════════
async function loadCSV() {
  const errors = [];
  for (const url of URLS) {
    try {
      const res = await fetch(url, { signal: AbortSignal.timeout(8000) });
      if (!res.ok) { errors.push(`${url} → HTTP ${res.status}`); continue; }
      const text = await res.text();
      // Prüfen ob wirklich CSV-Inhalt (nicht eine Login-Seite)
      if (text.includes('<!DOCTYPE') || text.includes('<html')) {
        errors.push(`${url} → HTML zurückgekommen (Login-Seite?)`);
        continue;
      }
      if (text.trim().length < 10) { errors.push(`${url} → Leere Antwort`); continue; }
      return { text, url };
    } catch(e) { errors.push(`${url} → ${e.message}`); }
  }
  throw new Error(errors.join('\n'));
}

// ══════════════════════════════════════════════
//  CSV PARSER
// ══════════════════════════════════════════════
function parseCSV(text) {
  // Zeilen splitten — Google gibt manchmal \r\n zurück
  const lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').trim().split('\n');
  const games = [];

  // Erste Zeile loggen damit wir sehen was ankommt
  console.log('CSV Zeilen gesamt:', lines.length);
  console.log('Zeile 0:', lines[0]);
  console.log('Zeile 1:', lines[1] || '(leer)');

  // Header-Zeile suchen: erste Zeile die "Name" enthält
  let headerIdx = -1;
  for (let i = 0; i < Math.min(lines.length, 5); i++) {
    const lower = lines[i].toLowerCase();
    // Flexibel: akzeptiert jede Zeile die mindestens "name" enthält
    if (lower.includes('name')) { headerIdx = i; break; }
  }

  if (headerIdx === -1) {
    // Notfall: erste Zeile als Header behandeln
    console.warn('Kein Header mit "name" gefunden, nehme Zeile 0');
    headerIdx = 0;
  }

  const headers = parseLine(lines[headerIdx]).map(h =>
    h.trim().toLowerCase().replace(/[^a-zäöü0-9\-_]/gi, '').trim()
  );
  console.log('Erkannte Header:', headers);

  // Spalten-Indizes — sehr tolerant
  const col = key => {
    // Exakter Match zuerst
    let idx = headers.indexOf(key);
    if (idx !== -1) return idx;
    // Dann: enthält den Key
    idx = headers.findIndex(h => h.includes(key));
    return idx;
  };

  const colAppId = col('app');
  const colPreis = col('preis');
  const colName  = col('name');
  const colTime  = (() => {
    // "gametime", "spielzeit", "time", "min", "minuten" — nimm den ersten Treffer
    for (const k of ['gametime','spielzeit','time','min','minuten']) {
      const i = col(k);
      if (i !== -1) return i;
    }
    return -1;
  })();
  const colNotiz = col('notiz');
  const colLink  = col('link');

  console.log(`Spalten → App-ID:${colAppId} Preis:${colPreis} Name:${colName} Zeit:${colTime} Notiz:${colNotiz} Link:${colLink}`);

  for (let i = headerIdx + 1; i < lines.length; i++) {
    const cols = parseLine(lines[i]);
    const name = get(cols, colName);
    if (!name || name.length < 2) continue;
    games.push({
      appId:   get(cols, colAppId),
      preis:   get(cols, colPreis),
      name,
      timeRaw: get(cols, colTime),
      notiz:   get(cols, colNotiz),
      link:    get(cols, colLink),
      steamPrice: null, discount: null, isActuallyFree: false,
    });
  }
  console.log(`Geparste Games: ${games.length}`);
  return games;
}

function get(arr, idx) {
  if (idx === -1 || idx === undefined || idx >= arr.length) return '';
  return (arr[idx] || '').trim();
}

function parseLine(line) {
  const res = []; let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { if (inQ && line[i+1]==='"') { cur+='"'; i++; } else inQ=!inQ; }
    else if (c === ',' && !inQ) { res.push(cur); cur=''; }
    else cur += c;
  }
  res.push(cur);
  return res;
}

// ══════════════════════════════════════════════
//  ZEIT-FORMATIERUNG
// ══════════════════════════════════════════════
function formatTime(raw) {
  if (!raw || raw === '/' || raw === '') return null;
  const s = String(raw).trim();

  // Range z.B. "720-900" oder "720–900"
  const range = s.match(/^(\d+)\s*[-–]\s*(\d+)$/);
  if (range) {
    const lo = parseInt(range[1]), hi = parseInt(range[2]);
    return `${fmtMin(lo)}–${fmtMin(hi)}`;
  }

  // Direkte Minutenzahl
  const n = parseInt(s);
  if (!isNaN(n) && n > 0) return fmtMin(n);

  // Schon als Text: "1,5 Std", "45 Min" etc. — direkt zurückgeben
  if (/std|min|h\b/i.test(s)) return s;

  return null;
}

function fmtMin(min) {
  if (min < 60) return `${min} Min`;
  const h = Math.round((min / 60) * 2) / 2;
  return h % 1 === 0 ? `${h} Std` : `${h.toFixed(1).replace('.',',')} Std`;
}

function timeToSort(raw) {
  if (!raw || raw === '/') return Infinity;
  const range = String(raw).match(/^(\d+)\s*[-–]\s*(\d+)$/);
  if (range) return (parseInt(range[1]) + parseInt(range[2])) / 2;
  const n = parseInt(raw);
  return isNaN(n) ? Infinity : n;
}

// ══════════════════════════════════════════════
//  PREIS HELPER
// ══════════════════════════════════════════════
function priceToNum(str) {
  if (!str) return Infinity;
  const n = parseFloat(String(str).replace(',','.').replace(/[^0-9.]/g,''));
  return isNaN(n) ? Infinity : n;
}
function isDemo(g) {
  return ['notiz','preis','name'].some(k => (g[k]||'').toLowerCase().includes('demo'));
}
function isFree(g) {
  return g.isActuallyFree || priceToNum(g.preis) === 0;
}

// ══════════════════════════════════════════════
//  STEAM PREIS
// ══════════════════════════════════════════════
async function fetchSteamPrice(appId) {
  if (!appId) return null;
  try {
    const steamUrl = `https://store.steampowered.com/api/appdetails?appids=${appId}&cc=de&filters=price_overview`;
    const proxy    = `https://api.allorigins.win/get?url=${encodeURIComponent(steamUrl)}`;
    const res = await fetch(proxy, { signal: AbortSignal.timeout(7000) });
    if (!res.ok) return null;
    const json = await res.json();
    const data = JSON.parse(json.contents);
    const info = data?.[appId]?.data?.price_overview;
    if (!info) return null;
    return {
      final:    (info.final   / 100).toFixed(2).replace('.',',') + ' €',
      discount: info.discount_percent,
      isFree:   info.final === 0,
    };
  } catch { return null; }
}

async function fetchPrices(games) {
  const withId = games.filter(g => g.appId);
  for (let i = 0; i < withId.length; i += 5) {
    await Promise.all(withId.slice(i, i+5).map(async g => {
      const p = await fetchSteamPrice(g.appId);
      if (p) { g.steamPrice = p.final; g.discount = p.discount > 0 ? p.discount : null; g.isActuallyFree = p.isFree; }
      updateCard(g);
    }));
  }
}

// ══════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════
function renderGrid(games) {
  const grid = document.getElementById('grid');
  if (!games.length) { grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--text-dim)">😶 Keine Games gefunden</div>'; return; }
  grid.innerHTML = games.map((g,i) => cardHTML(g,i)).join('');
  document.getElementById('stats').textContent = `${games.length} / ${allGames.length} Games`;
}

function cardHTML(g, idx) {
  const link      = g.link || (g.appId ? `https://store.steampowered.com/app/${g.appId}/` : '#');
  const noteHtml  = (g.notiz && g.notiz !== '/' && g.notiz !== '') ? `<div class="card-note">${esc(g.notiz)}</div>` : '';
  const timeLabel = formatTime(g.timeRaw);
  const timeTag   = timeLabel ? `<span class="tag">⏱ ${timeLabel}</span>` : '';
  const saleBadge = g.discount ? `<span class="sale-badge">-${g.discount}%</span>` : '';
  const delay     = Math.min(idx * 25, 500);

  return `<div class="card" id="c-${g.appId || slug(g.name)}" style="animation-delay:${delay}ms">
  <div class="card-img-wrap">
    ${g.appId
      ? `<img class="card-img" src="${steamImg(g.appId)}" alt="${esc(g.name)}" loading="lazy" onerror="this.outerHTML='<div class=card-img-placeholder>🎮</div>'">`
      : `<div class="card-img-placeholder">🎮</div>`}
    ${saleBadge}
  </div>
  <div class="card-body">
    <div class="card-title">${esc(g.name)}</div>
    <div class="card-meta">${priceTag(g)}${timeTag}</div>
    ${noteHtml}
  </div>
  <div class="card-footer">
    <a class="btn-steam" href="${esc(link)}" target="_blank" rel="noopener">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M11.979 0C5.678 0 .511 4.86.022 11.037l6.432 2.658c.545-.371 1.203-.59 1.912-.59.063 0 .125.004.188.006l2.861-4.142V8.91c0-2.495 2.028-4.524 4.524-4.524 2.494 0 4.524 2.029 4.524 4.524s-2.03 4.525-4.524 4.525h-.105l-4.076 2.911c0 .052.004.105.004.159 0 1.875-1.515 3.396-3.39 3.396-1.635 0-3.016-1.173-3.331-2.727L.436 15.27C1.862 20.307 6.486 24 11.979 24c6.627 0 11.999-5.373 11.999-12S18.606 0 11.979 0zM7.54 18.21l-1.473-.61c.262.543.714.999 1.314 1.25 1.297.539 2.793-.076 3.332-1.375.263-.63.264-1.319.005-1.949s-.75-1.121-1.377-1.383c-.624-.26-1.29-.249-1.878-.03l1.523.63c.956.4 1.409 1.5 1.009 2.455-.397.957-1.497 1.41-2.455 1.012H7.54zm11.415-9.303c0-1.662-1.353-3.015-3.015-3.015-1.665 0-3.015 1.353-3.015 3.015 0 1.665 1.35 3.015 3.015 3.015 1.663 0 3.015-1.35 3.015-3.015zm-5.273-.005c0-1.252 1.013-2.266 2.265-2.266 1.249 0 2.266 1.014 2.266 2.266 0 1.251-1.017 2.265-2.266 2.265-1.252 0-2.265-1.014-2.265-2.265z"/></svg>
      Steam
    </a>
  </div>
</div>`;
}

function priceTag(g) {
  if (g.steamPrice !== null) {
    if (g.isActuallyFree) return `<span class="tag price-free">🆓 Kostenlos</span>`;
    return `<span class="tag ${g.discount?'price-sale':'price-paid'}">${g.discount?'🔥':'💰'} ${g.steamPrice}</span>`;
  }
  const p = (g.preis||'').trim();
  if (!p) return g.appId ? `<span class="tag">💰 <span class="price-loading"></span></span>` : `<span class="tag">💰 ?</span>`;
  if (priceToNum(p) === 0) return isDemo(g) ? `<span class="tag price-demo">🎮 Demo</span>` : `<span class="tag price-free">🆓 Kostenlos</span>`;
  return `<span class="tag price-paid">💰 ${esc(p)}</span>`;
}

function updateCard(g) {
  const card = document.getElementById(`c-${g.appId || slug(g.name)}`);
  if (!card) return;
  const first = card.querySelector('.card-meta .tag');
  if (first) first.outerHTML = priceTag(g);
  const wrap = card.querySelector('.card-img-wrap');
  if (wrap && g.discount) {
    const ex = wrap.querySelector('.sale-badge');
    if (ex) ex.textContent = `-${g.discount}%`;
    else { const b=document.createElement('span'); b.className='sale-badge'; b.textContent=`-${g.discount}%`; wrap.appendChild(b); }
  }
}

// ══════════════════════════════════════════════
//  FILTER / SORT
// ══════════════════════════════════════════════
function apply() {
  const q = document.getElementById('search').value.toLowerCase();
  const s = document.getElementById('sort').value;
  filteredGames = allGames.filter(g => {
    const mQ = !q || g.name.toLowerCase().includes(q) || (g.notiz||'').toLowerCase().includes(q);
    const mF = currentFilter==='all' || (currentFilter==='free'&&isFree(g)) || (currentFilter==='demo'&&isDemo(g));
    return mQ && mF;
  });
  filteredGames.sort((a,b) => {
    if (s==='name')       return a.name.localeCompare(b.name,'de');
    if (s==='price-asc')  return priceToNum(a.steamPrice||a.preis) - priceToNum(b.steamPrice||b.preis);
    if (s==='price-desc') return priceToNum(b.steamPrice||b.preis) - priceToNum(a.steamPrice||a.preis);
    if (s==='time-asc')   return timeToSort(a.timeRaw) - timeToSort(b.timeRaw);
    return 0;
  });
  renderGrid(filteredGames);
}

// ══════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════
const esc  = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const slug = s => String(s||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
async function init() {
  const grid = document.getElementById('grid');
  let csvText, usedUrl;

  try {
    const result = await loadCSV();
    csvText = result.text;
    usedUrl = result.url;
    console.log('Geladen von:', usedUrl);
  } catch(e) {
    grid.innerHTML = `<div class="state-msg" style="grid-column:1/-1">
      <span class="icon">⚠️</span>
      <div class="err-box">
        <strong>Sheet konnte nicht geladen werden.</strong><br><br>
        Bitte prüfe:<br>
        1. Ist das Sheet auf <strong>"Jeder mit dem Link kann ansehen"</strong> gestellt?<br>
        2. Bist du online?<br><br>
        <small style="color:var(--text-dim)">Öffne die Browser-Konsole (F12) für Details.</small><br>
        <button class="retry-btn" onclick="location.reload()">🔄 Nochmal versuchen</button>
      </div>
    </div>`;
    console.error('Alle Lade-Versuche fehlgeschlagen:\n' + e.message);
    return;
  }

  allGames = parseCSV(csvText);

  if (!allGames.length) {
    grid.innerHTML = `<div class="state-msg" style="grid-column:1/-1">
      <span class="icon">🤔</span>
      <div class="err-box">
        <strong>Sheet geladen, aber keine Games erkannt.</strong><br><br>
        Öffne die Browser-Konsole (F12 → Console) — dort siehst du die erkannten Spalten-Namen.
        Vergewissere dich, dass die erste Zeile die Spaltenüberschriften enthält
        (z.B. <code>App-ID</code>, <code>Name</code>, <code>Preis</code>).
      </div>
    </div>`;
    return;
  }

  allGames.sort((a,b) => a.name.localeCompare(b.name,'de'));
  filteredGames = [...allGames];
  document.getElementById('stats').textContent = `${allGames.length} / ${allGames.length} Games`;
  renderGrid(filteredGames);
  fetchPrices(allGames);
}

// ══════════════════════════════════════════════
//  EVENTS
// ══════════════════════════════════════════════
document.getElementById('search').addEventListener('input', apply);
document.getElementById('sort').addEventListener('change', apply);
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    apply();
  });
});

init();
</script>
</body>
</html>
