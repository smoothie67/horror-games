<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>☠ Horror Games</title>
<link rel="preconnect" href="[fonts.googleapis.com](https://fonts.googleapis.com)">
<link rel="preconnect" href="[fonts.gstatic.com](https://fonts.gstatic.com)" crossorigin>
<link href="[fonts.googleapis.com](https://fonts.googleapis.com/css2?family=Creepster&family=Nunito:wght@400;600;700&display=swap)" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #111118;
    --card: #14141e;
    --card-hover: #1c1c2a;
    --border: #2a2a3a;
    --border-glow: #ff2244;
    --red: #ff2244;
    --red-dim: #7a0f1f;
    --text: #e8e8f0;
    --text-dim: #888899;
    --green: #22ff88;
    --orange: #ff8833;
    --blue: #4488ff;
    --tag-bg: #1e1e2e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='[w3.org](http://www.w3.org/2000/svg)'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  header {
    position: sticky; top: 0;
    z-index: 100;
    background: rgba(10,10,15,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
  }
  .header-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 20px;
    height: 64px;
    flex-wrap: wrap;
  }
  .logo {
    font-family: 'Creepster', cursive;
    font-size: 1.8rem;
    color: var(--red);
    letter-spacing: 2px;
    white-space: nowrap;
    text-shadow: 0 0 20px rgba(255,34,68,0.5);
    flex-shrink: 0;
  }
  .logo span {
    color: var(--text-dim);
    font-size: 1rem;
    font-family: 'Nunito', sans-serif;
    font-weight: 400;
    margin-left: 8px;
  }

  .search-wrap {
    flex: 1;
    min-width: 160px;
    max-width: 340px;
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px 8px 38px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--red); }
  .search-wrap input::placeholder { color: var(--text-dim); }
  .search-wrap::before {
    content: '🔍';
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    font-size: 0.85rem; pointer-events: none;
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .sort-select {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 0.85rem;
    outline: none;
    cursor: pointer;
  }
  .filter-btn {
    background: var(--tag-bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    color: var(--text-dim);
    font-size: 0.8rem;
    font-family: 'Nunito', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .filter-btn:hover, .filter-btn.active {
    border-color: var(--red);
    color: var(--red);
    background: rgba(255,34,68,0.08);
  }

  #stats {
    font-size: 0.8rem;
    color: var(--text-dim);
    white-space: nowrap;
    margin-left: auto;
  }

  .hero {
    text-align: center;
    padding: 56px 24px 32px;
    position: relative;
    overflow: hidden;
  }
  .hero::after {
    content: '';
    position: absolute;
    bottom: 0; left: 50%; transform: translateX(-50%);
    width: 60%; height: 1px;
    background: linear-gradient(90deg, transparent, var(--red-dim), transparent);

  .hero h1 {
    font-family: 'Creepster', cursive;
    font-size: clamp(2.8rem, 7vw, 5rem);
    color: var(--text);
    letter-spacing: 4px;
    line-height: 1.1;
    text-shadow: 0 0 40px rgba(255,34,68,0.3), 0 2px 0 #000;

  .hero h1 em { color: var(--red); font-style: normal; }
  .hero p { margin-top: 10px; color: var(--text-dim); font-size: 0.95rem; }
  .blood-drip {
    font-size: 1.6rem;
    display: block;
    margin: 6px 0 0;
    animation: drip 3s ease-in-out infinite;
    transform-origin: top center;

  @keyframes drip {
    0%,100% { transform: scaleY(1); }
    50%      { transform: scaleY(1.15); }

  .grid-wrap {
    max-width: 1400px;
    margin: 0 auto;
    padding: 32px 20px 64px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 18px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: transform 0.22s ease, border-color 0.22s ease, box-shadow 0.22s ease;
    animation: fadeIn 0.4s ease both;

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }

  .card-img {
    width: 100%;

    width: 100%;
    aspect-ratio: 460/215;
    background: linear-gradient(135deg, #1a0a0f 0%, #0f0f1a 100%);

    align-items: center;
    justify-content: center;
    font-size: 2.5rem;

  .card-body {
    padding: 14px 14px 12px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .card-title {
    font-size: 0.95rem;
    font-weight: 700;
    line-height: 1.3;
    color: var(--text);
  }

  .card-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 2px;
  }
  .tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--tag-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 8px;
    font-size: 0.76rem;
    color: var(--text-dim);

  .tag.price-free { color: var(--green);  border-color: rgba(34,255,136,0.2);  background: rgba(34,255,136,0.05); }
  .tag.price-sale { color: var(--orange); border-color: rgba(255,136,51,0.2);  background: rgba(255,136,51,0.05); }
  .tag.price-paid { color: #aac4ff;       border-color: rgba(100,160,255,0.2); background: rgba(100,160,255,0.05); }
  .tag.price-demo { color: #dd88ff;       border-color: rgba(200,100,255,0.2); background: rgba(200,100,255,0.05); }
  .tag.price-na   { color: var(--text-dim); }

  .card-note {
    font-size: 0.8rem;
    color: var(--text-dim);
    font-style: italic;
    line-height: 1.4;
    border-left: 2px solid var(--red-dim);
    padding-left: 8px;
  }

  .card-footer {
    padding: 0 14px 14px;
    display: flex;
    gap: 8px;
    margin-top: auto;
  }
  .btn-steam {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    background: linear-gradient(135deg, #1b2838 0%, #2a475e 100%);
    border: 1px solid #2a475e;
    border-radius: 8px;
    padding: 8px 12px;
    color: #c6d4df;
    font-family: 'Nunito', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    text-decoration: none;
    transition: all 0.18s;
  }
  .btn-steam:hover {
    background: linear-gradient(135deg, #2a475e 0%, #1b2838 100%);
    border-color: #66c0f4;
    color: #fff;

  .state-msg {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-dim);
    font-size: 1rem;
  }
  .state-msg .icon { font-size: 3rem; display: block; margin-bottom: 16px; }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--red);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--red-dim); border-radius: 3px; }

  .price-loading {
    display: inline-block;
    width: 50px; height: 14px;
    background: linear-gradient(90deg, var(--border) 25%, #2a2a3a 50%, var(--border) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.2s infinite;
    border-radius: 4px;
    vertical-align: middle;
  }
  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .sale-badge {
    position: absolute;
    top: 8px; right: 8px;
    background: var(--orange);
    color: #000;
    font-weight: 700;
    font-size: 0.72rem;
    padding: 2px 7px;
    border-radius: 4px;
  }
  .card-img-wrap { position: relative; }

  #last-updated {
    text-align: center;
    font-size: 0.76rem;
    color: var(--text-dim);
    padding-bottom: 12px;
    margin-top: -16px;
  }
</style>

<body>

<header>
  <div class="header-inner">
    <div class="logo">☠ Horror<span id="game-count-badge"></span></div>
    <div class="search-wrap">
      <input type="text" id="search" placeholder="Game suchen…" autocomplete="off">

<div class="hero">

    </div>

<script>
// ─────────────────────────────────────────────
//  CONFIG
// ─────────────────────────────────────────────
const SHEET_ID   = '1DkkAnT3A-0Xw9prChT4M2OkWbe4uu2VmVFi9SHmeNUc';
const SHEET_NAME = 'Horrorgames';
const CSV_URL    = `[docs.google.com](https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NAME)})`;
const steamImg   = id => `[cdn.akamai.steamstatic.com](https://cdn.akamai.steamstatic.com/steam/apps/${id}/header.jpg)`;

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
let allGames      = [];
let filteredGames = [];
let currentFilter = 'all';

// ─────────────────────────────────────────────
//  GAMETIME — Hilfsfunktionen
// ─────────────────────────────────────────────

// Rundet Minuten auf halbe Stunden: 90 → 1.5, 75 → 1.5, 60 → 1
function roundHours(min) {
  return Math.round((min / 60) * 2) / 2;
}

// Einzelne Minutenzahl → Anzeigetext
// < 60  → "X Min"
// ≥ 60  → "1 Std" / "1,5 Std" / "2 Std" etc.
function formatSingle(min) {
  if (min < 60) return `${min} Min`;
  const h = roundHours(min);
  return h % 1 === 0
    ? `${h} Std`
    : `${h.toFixed(1).replace('.', ',')} Std`;
}

// Haupt-Formatter — verarbeitet Einzelwerte UND Ranges ("720-900")
// Gibt den fertigen Anzeigestring zurück oder null wenn leer/ungültig
function formatMinutes(input) {
  if (input === null || input === undefined || input === '') return null;
  const str = String(input).trim();
  if (!str || str === '/') return null;

  // Range erkennen: "720-900" oder "720–900"
  const rangeMatch = str.match(/^(\d+)\s*[-–]\s*(\d+)$/);
  if (rangeMatch) {
    const lo = parseInt(rangeMatch[1], 10);
    const hi = parseInt(rangeMatch[2], 10);
    if (lo <= 0 || hi <= 0) return null;

    const loIsMin = lo < 60;
    const hiIsMin = hi < 60;

    // Beide unter 60 Min → "30–45 Min"
    if (loIsMin && hiIsMin) {
      return `${lo}–${hi} Min`;
    }
    // Beide ab 60 Min → "12–15 Std"
    if (!loIsMin && !hiIsMin) {
      const loH = roundHours(lo);
      const hiH = roundHours(hi);
      const fmt = h => h % 1 === 0 ? `${h}` : `${h.toFixed(1).replace('.', ',')}`;
      return `${fmt(loH)}–${fmt(hiH)} Std`;
    }
    // Gemischt (z.B. 50–70: unterschreitet/überschreitet 60er-Grenze) → beide einzeln
    return `${formatSingle(lo)}–${formatSingle(hi)}`;
  }

  // Einzelwert
  const n = parseInt(str, 10);
  if (!n || n <= 0) return null;
  return formatSingle(n);
}

// Gibt den Sortierwert zurück (Mittelwert bei Range, sonst die Zahl selbst)
function timeToSortValue(input) {
  if (input === null || input === undefined || input === '') return Infinity;
  const str = String(input).trim();
  if (!str || str === '/') return Infinity;

  const rangeMatch = str.match(/^(\d+)\s*[-–]\s*(\d+)$/);
  if (rangeMatch) {
    return (parseInt(rangeMatch[1], 10) + parseInt(rangeMatch[2], 10)) / 2;
  }
  const n = parseInt(str, 10);
  return isNaN(n) ? Infinity : n;
}

// Fallback: Text aus Spalte D ("1,5 Std", "45 Min", "4-5 Std") → Minuten-String
// Gibt direkt einen normalisierten String zurück, den formatMinutes() versteht
function normalizeTimeText(str) {
  if (!str || str === '/') return null;
  const s = str.toLowerCase().replace(',', '.').replace('–', '-');

  // Range wie "4-5 Std" oder "30-45 Min"
  const range = s.match(/(\d+\.?\d*)\s*-\s*(\d+\.?\d*)\s*(std|h|min)?/);
  if (range) {
    const unit = (range[3] || '').trim();
    const lo = parseFloat(range[1]);
    const hi = parseFloat(range[2]);
    const loMin = unit.startsWith('min') ? Math.round(lo) : Math.round(lo * 60);
    const hiMin = unit.startsWith('min') ? Math.round(hi) : Math.round(hi * 60);
    return `${loMin}-${hiMin}`;
  }

  // Einzelwert wie "1,5 Std" oder "45 Min"
  const single = s.match(/(\d+\.?\d*)\s*(std|h|min)?/);
  if (single) {
    const val  = parseFloat(single[1]);
    const unit = (single[2] || '').trim();
    const mins = unit.startsWith('min') ? Math.round(val) : Math.round(val * 60);
    return String(mins);
  }
  return null;
}

// ─────────────────────────────────────────────
//  CSV PARSER
// ─────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const games = [];

  // Header-Zeile finden
  let headerIdx = -1;
  for (let i = 0; i < lines.length; i++) {
    const lower = lines[i].toLowerCase();
    if (lower.includes('app-id') || (lower.includes('name') && lower.includes('preis'))) {
      headerIdx = i;
      break;
    }
  }
  if (headerIdx === -1) return games;

  const headers = parseLine(lines[headerIdx]).map(h => h.trim().toLowerCase());

  // Spalten-Indizes
  const colAppId    = headers.findIndex(h => h.includes('app'));
  const colPreis    = headers.findIndex(h => h === 'preis');
  const colName     = headers.findIndex(h => h === 'name');
  // Spalte E: reine Minuten-Eingabe (Name: "min" oder "minuten" o.ä.)
  const colTimeMin  = headers.findIndex(h => h === 'min' || h === 'minuten' || h === 'time_min' || h === 'gametime_min' || h === 'spielzeit_min');
  // Spalte D: Text-Fallback ("1,5 Std", "45 Min" etc.)
  const colTimeText = headers.findIndex(h => (h.includes('gametime') || h.includes('spielzeit')) && h !== headers[colTimeMin]);
  const colNotiz    = headers.findIndex(h => h.includes('notiz'));
  const colLink     = headers.findIndex(h => h.includes('link'));

  for (let i = headerIdx + 1; i < lines.length; i++) {
    const cols = parseLine(lines[i]);
    const name = get(cols, colName);
    if (!name || name.length < 2) continue;

    const rawMin      = get(cols, colTimeMin);   // z.B. "90" oder "720-900"
    const rawTimeText = get(cols, colTimeText);  // z.B. "1,5 Std" — Fallback

    // timeRaw: der normalisierte Minuten-String für Anzeige + Sortierung
    // Priorität: Spalte E > Spalte D (als Fallback)
    let timeRaw = null;
    const trimmed = rawMin ? rawMin.trim() : '';
    if (trimmed && trimmed !== '/') {
      // Spalte E direkt übernehmen (Einzelzahl oder Range wie "720-900")
      timeRaw = trimmed;
    } else if (rawTimeText) {
      // Spalte D als Fallback: in Minuten-String umwandeln
      timeRaw = normalizeTimeText(rawTimeText);
    }

    games.push({
      appId:   get(cols, colAppId),
      preis:   get(cols, colPreis),
      name,
      timeRaw,          // String für Anzeige & Sortierung, z.B. "90" oder "720-900"
      notiz:   get(cols, colNotiz),
      link:    get(cols, colLink),
      steamPrice:     null,
      discount:       null,
      isActuallyFree: false,
    });
  }
  return games;
}

function get(arr, idx) {
  if (idx === -1 || idx >= arr.length) return '';
  return (arr[idx] || '').trim();
}

function parseLine(line) {
  const result = [];
  let current = '';
  let inQuote = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') {
      if (inQuote && line[i+1] === '"') { current += '"'; i++; }
      else inQuote = !inQuote;
    } else if (ch === ',' && !inQuote) {
      result.push(current); current = '';
    } else {
      current += ch;
    }
  }
  result.push(current);
  return result;
}

// ─────────────────────────────────────────────
//  PRICE HELPERS
// ─────────────────────────────────────────────
function priceToNum(str) {
  if (!str) return Infinity;
  const s = String(str).replace(',', '.').replace(/[^0-9.]/g, '');
  const n = parseFloat(s);
  return isNaN(n) ? Infinity : n;
}

function isDemo(game) {
  const n = (game.notiz || '').toLowerCase();
  const p = (game.preis  || '').toLowerCase();
  return n.includes('demo') || p.includes('demo') || game.name.toLowerCase().includes('demo');
}

function isFree(game) {
  if (game.isActuallyFree) return true;
  const p = priceToNum(game.preis);
  return p === 0;
}

function isNAInDE(game) {
  return (game.notiz || '').toLowerCase().includes('nicht zur verfügung');
}

// ─────────────────────────────────────────────
//  STEAM PRICE FETCH
// ─────────────────────────────────────────────
async function fetchSteamPrice(appId) {
  if (!appId || appId.trim() === '') return null;
  try {
    const url   = `[store.steampowered.com](https://store.steampowered.com/api/appdetails?appids=${appId}&cc=de&filters=price_overview)`;
    const proxy = `[api.allorigins.win](https://api.allorigins.win/get?url=${encodeURIComponent(url)})`;
    const res   = await fetch(proxy, { signal: AbortSignal.timeout(6000) });
    if (!res.ok) return null;
    const json  = await res.json();
    const data  = JSON.parse(json.contents);
    const info  = data?.[appId]?.data?.price_overview;
    if (!info) return null;
    return {
      final:    (info.final   / 100).toFixed(2).replace('.', ',') + ' €',
      initial:  (info.initial / 100).toFixed(2).replace('.', ',') + ' €',
      discount: info.discount_percent,
      isFree:   info.final === 0,
    };
  } catch { return null; }
}

async function fetchPricesInBatches(games, batchSize = 4) {
  const gamesWithId = games.filter(g => g.appId);
  for (let i = 0; i < gamesWithId.length; i += batchSize) {
    const batch = gamesWithId.slice(i, i + batchSize);
    await Promise.all(batch.map(async g => {
      const price = await fetchSteamPrice(g.appId);
      if (price) {
        g.steamPrice      = price.final;
        g.discount        = price.discount > 0 ? price.discount : null;
        g.isActuallyFree  = price.isFree;
      }
      updateCard(g);
    }));
  }
}

// ─────────────────────────────────────────────
//  RENDER
// ─────────────────────────────────────────────
function renderGrid(games) {
  const grid = document.getElementById('grid');
  if (games.length === 0) {
    grid.innerHTML = '<div style="display:block;grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--text-dim)">😶 Keine Games gefunden</div>';
    return;
  }
  grid.innerHTML = games.map((g, i) => cardHTML(g, i)).join('');
  document.getElementById('stats').textContent = `${games.length} / ${allGames.length} Games`;
}

function cardHTML(g, animIdx) {
  const hasImg = !!g.appId;
  const link   = g.link || (g.appId ? `[store.steampowered.com](https://store.steampowered.com/app/${g.appId}/)` : '#');

  const noteHtml  = g.notiz && g.notiz !== '/' && g.notiz !== ''
    ? `<div class="card-note">${escHtml(g.notiz)}</div>` : '';

  const priceTag  = buildPriceTag(g);
  const timeLabel = formatMinutes(g.timeRaw);
  const timeTag   = timeLabel ? `<span class="tag">⏱ ${timeLabel}</span>` : '';
  const naTag     = isNAInDE(g) ? `<span class="tag" title="In Deutschland nicht verfügbar">🚫 DE n.v.</span>` : '';
  const saleBadge = g.discount  ? `<span class="sale-badge">-${g.discount}%</span>` : '';
  const delay     = Math.min(animIdx * 30, 600);

  return `<div class="card" id="card-${g.appId || slugify(g.name)}" style="animation-delay:${delay}ms">
  <div class="card-img-wrap">
    ${hasImg
      ? `<img class="card-img" src="${steamImg(g.appId)}" alt="${escHtml(g.name)}" loading="lazy" onerror="this.outerHTML='<div class=card-img-placeholder>🎮</div>'">`
      : `<div class="card-img-placeholder">🎮</div>`}
    ${saleBadge}
  </div>
  <div class="card-body">
    <div class="card-title">${escHtml(g.name)}</div>
    <div class="card-meta">
      ${priceTag}
      ${timeTag}
      ${naTag}
    </div>
    ${noteHtml}
  </div>
  <div class="card-footer">
    <a class="btn-steam" href="${escHtml(link)}" target="_blank" rel="noopener">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M11.979 0C5.678 0 .511 4.86.022 11.037l6.432 2.658c.545-.371 1.203-.59 1.912-.59.063 0 .125.004.188.006l2.861-4.142V8.91c0-2.495 2.028-4.524 4.524-4.524 2.494 0 4.524 2.029 4.524 4.524s-2.03 4.525-4.524 4.525h-.105l-4.076 2.911c0 .052.004.105.004.159 0 1.875-1.515 3.396-3.39 3.396-1.635 0-3.016-1.173-3.331-2.727L.436 15.27C1.862 20.307 6.486 24 11.979 24c6.627 0 11.999-5.373 11.999-12S18.606 0 11.979 0zM7.54 18.21l-1.473-.61c.262.543.714.999 1.314 1.25 1.297.539 2.793-.076 3.332-1.375.263-.63.264-1.319.005-1.949s-.75-1.121-1.377-1.383c-.624-.26-1.29-.249-1.878-.03l1.523.63c.956.4 1.409 1.5 1.009 2.455-.397.957-1.497 1.41-2.455 1.012H7.54zm11.415-9.303c0-1.662-1.353-3.015-3.015-3.015-1.665 0-3.015 1.353-3.015 3.015 0 1.665 1.35 3.015 3.015 3.015 1.663 0 3.015-1.35 3.015-3.015zm-5.273-.005c0-1.252 1.013-2.266 2.265-2.266 1.249 0 2.266 1.014 2.266 2.266 0 1.251-1.017 2.265-2.266 2.265-1.252 0-2.265-1.014-2.265-2.265z"/></svg>
      Steam
    </a>
  </div>
</div>`;
}

function buildPriceTag(g) {
  if (g.steamPrice !== null) {
    if (g.isActuallyFree) return `<span class="tag price-free">🆓 Kostenlos</span>`;
    const cls  = g.discount ? 'price-sale' : 'price-paid';
    const icon = g.discount ? '🔥' : '💰';
    return `<span class="tag ${cls}">${icon} ${g.steamPrice}</span>`;
  }
  const p = (g.preis || '').trim();
  if (!p) {
    return g.appId
      ? `<span class="tag">💰 <span class="price-loading"></span></span>`
      : `<span class="tag price-na">💰 ?</span>`;
  }
  if (p === '0,00 €' || p.startsWith('0,00') || p.startsWith('0.00')) {
    if (isDemo(g)) return `<span class="tag price-demo">🎮 Demo</span>`;
    return `<span class="tag price-free">🆓 Kostenlos</span>`;
  }
  return `<span class="tag price-paid">💰 ${escHtml(p)}</span>`;
}

function updateCard(g) {
  const card = document.getElementById(`card-${g.appId || slugify(g.name)}`);
  if (!card) return;
  const firstTag = card.querySelector('.card-meta .tag');
  if (firstTag) firstTag.outerHTML = buildPriceTag(g);
  const imgWrap = card.querySelector('.card-img-wrap');
  if (imgWrap) {
    const existing = imgWrap.querySelector('.sale-badge');
    if (g.discount) {
      if (existing) existing.textContent = `-${g.discount}%`;
      else {
        const b = document.createElement('span');
        b.className   = 'sale-badge';
        b.textContent = `-${g.discount}%`;
        imgWrap.appendChild(b);
      }
    }
  }
}

// ─────────────────────────────────────────────
//  FILTER / SORT
// ─────────────────────────────────────────────
function applyFiltersAndSort() {
  const q    = document.getElementById('search').value.toLowerCase();
  const sort = document.getElementById('sort').value;

  filteredGames = allGames.filter(g => {
    const matchQ = !q || g.name.toLowerCase().includes(q) || (g.notiz || '').toLowerCase().includes(q);
    let matchFilter = true;
    if (currentFilter === 'free') matchFilter = isFree(g);
    if (currentFilter === 'demo') matchFilter = isDemo(g);
    return matchQ && matchFilter;
  });

  filteredGames.sort((a, b) => {
    if (sort === 'name')       return a.name.localeCompare(b.name, 'de');
    if (sort === 'price-asc')  return priceToNum(a.steamPrice || a.preis) - priceToNum(b.steamPrice || b.preis);
    if (sort === 'price-desc') return priceToNum(b.steamPrice || b.preis) - priceToNum(a.steamPrice || a.preis);
    if (sort === 'time-asc')   return timeToSortValue(a.timeRaw) - timeToSortValue(b.timeRaw);
    return 0;
  });

  renderGrid(filteredGames);
}

// ─────────────────────────────────────────────
//  UTILS
// ─────────────────────────────────────────────
function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function slugify(s) {
  return String(s || '').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');
}

// ─────────────────────────────────────────────
//  LAST UPDATED
// ─────────────────────────────────────────────
function extractLastUpdated(csvText) {
  const m = csvText.match(/Letzte Änderung[:\s]+([0-9.:\s]+)/i);
  if (m) document.getElementById('last-updated').textContent = `Zuletzt aktualisiert: ${m[1].trim()}`;
}

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
async function init() {
  const grid = document.getElementById('grid');
  let csvText;
  try {
    const res = await fetch(CSV_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    csvText = await res.text();
  } catch {
    grid.innerHTML = `<div class="state-msg" style="grid-column:1/-1">
      <span class="icon">⚠️</span>
      Konnte das Google Sheet nicht laden.<br>
      <small>Stelle sicher, dass es auf "Jeder mit dem Link" steht.</small>
    </div>`;
    return;
  }

  extractLastUpdated(csvText);
  allGames = parseCSV(csvText);

  if (allGames.length === 0) {
    grid.innerHTML = `<div class="state-msg" style="grid-column:1/-1"><span class="icon">🤔</span>Keine Spiele gefunden.</div>`;
    return;
  }

  allGames.sort((a, b) => a.name.localeCompare(b.name, 'de'));
  filteredGames = [...allGames];

  document.getElementById('game-count-badge').textContent = ' Games';
  document.getElementById('stats').textContent = `${allGames.length} / ${allGames.length} Games`;

  renderGrid(filteredGames);
  fetchPricesInBatches(allGames, 5);
}

// ─────────────────────────────────────────────
//  EVENTS
// ─────────────────────────────────────────────
document.getElementById('search').addEventListener('input', applyFiltersAndSort);
document.getElementById('sort').addEventListener('change', applyFiltersAndSort);
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    applyFiltersAndSort();
  });
});

init();
</script>
</body>
</html>
